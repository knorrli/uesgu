# Weekly dependency update PRs. Security advisories are also opened automatically
# regardless of schedule. Kept low-noise: grouped minor/patch bumps, one open PR
# limit per ecosystem.
version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ruby-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: [minor, patch]
