# Shapes the auto-generated GitHub Release notes (gh release create --generate-notes
# in release.yml). PRs are grouped by label; label-pr.yml auto-labels each PR from
# its branch prefix, and Dependabot self-labels `dependencies`, so this needs no
# manual upkeep. Add the `skip-changelog` label to a PR to keep it out of the notes
# (handy for pure docs churn). These notes are the changelog — the footer
# version links straight to them.
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: ✨ Features
      labels: [feature]
    - title: 🐛 Fixes
      labels: [bug]
    - title: 🔧 Maintenance
      labels: [chore]
    - title: 📦 Dependencies
      labels: [dependencies]
    - title: Other Changes
      labels: ["*"]
