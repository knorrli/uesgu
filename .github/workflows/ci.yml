name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Lint (Rubocop)
        run: bin/rubocop -f github

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Static analysis (Brakeman)
        # Invoke the gem directly, not bin/brakeman: the binstub force-adds
        # --ensure-latest, which fails CI whenever a newer Brakeman is released
        # (Dependabot handles upgrades separately).
        run: bundle exec brakeman --no-pager -q

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/uesgu_test

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Run tests (unit + integration)
        run: bin/rails test

      - name: Run system tests
        run: bin/rails test:system

      - name: Keep failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: system-test-screenshots
          path: tmp/screenshots
          if-no-files-found: ignore
