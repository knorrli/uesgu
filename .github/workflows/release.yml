name: Release

# Ship a release. Render service auto-deploy watches the `release` branch (see
# render.yaml), so production only moves when this workflow advances it. Cut a
# release by pushing a version tag:
#
#   bin/release 0.1.0      # or: git tag v0.1.0 && git push origin v0.1.0
#
# On a v* tag we fast-forward `release` to the tagged commit, which makes Render
# redeploy the web service + both crons together, on that exact commit (web runs
# migrations in its preDeployCommand before cutover). Then we publish a GitHub
# Release. No deploy hooks or Render API keys are involved — a Render cron job
# can only be deployed by an auto-deploy on push, so a shared deploy branch is
# what keeps all three services in lockstep.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Advance the release branch to the tag
        run: |
          echo "Pointing release -> ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          git push --force origin "${GITHUB_SHA}:refs/heads/release"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
