name: Release

# Deploys to Render and publishes a GitHub Release. Render service auto-deploy is
# OFF (render.yaml: autoDeployTrigger: off), so production only ever moves when a
# version tag is pushed:
#
#   bin/release 0.1.0      # or: git tag v0.1.0 && git push origin v0.1.0
#
# Each Render deploy hook is a per-service secret URL minted in the Render
# dashboard (Settings → Deploy Hook). We append ?ref=<tag> so Render checks out
# and deploys exactly the tagged commit. Stored as repo secrets:
#   RENDER_DEPLOY_HOOK_WEB     (required — the web service)
#   RENDER_DEPLOY_HOOK_SCRAPE  (optional — scrape-all cron)
#   RENDER_DEPLOY_HOOK_NOTIFY  (optional — notify-due cron)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (web)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_WEB is not set"; exit 1
          fi
          curl --fail --silent --show-error "${HOOK}&ref=${GITHUB_REF_NAME}"
          echo "Triggered web deploy of ${GITHUB_REF_NAME}"

      - name: Trigger Render deploy (crons)
        env:
          SCRAPE: ${{ secrets.RENDER_DEPLOY_HOOK_SCRAPE }}
          NOTIFY: ${{ secrets.RENDER_DEPLOY_HOOK_NOTIFY }}
        run: |
          for hook in "$SCRAPE" "$NOTIFY"; do
            [ -n "$hook" ] && curl --fail --silent --show-error "${hook}&ref=${GITHUB_REF_NAME}" && echo "Triggered cron deploy of ${GITHUB_REF_NAME}"
          done
          true

  release:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
