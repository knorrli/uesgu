# Omakase Ruby styling for Rails. Deliberately permissive: no method-length,
# line-length, or complexity metrics, and no single-line-method rules — just
# whitespace/layout consistency and a handful of style cops. Strings default to
# double quotes (omakase). The one house override below keeps array brackets
# tight (`[a, b]`, not `[ a, b ]`).
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false
