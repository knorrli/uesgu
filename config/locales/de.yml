    logs_heading: Server-Logs
    logs_body: Der Server führt kurzlebige Logs, die deine IP-Adresse enthalten, wie jede Website. Sie helfen bei Fehlern und Missbrauch, und wir nutzen sie nicht, um dich zu verfolgen oder zu profilieren.
    nothing_heading: Was wir nicht tun
    nothing_body: Kein Tracking, keine Statistik-Tools, keine Werbung. Wir verkaufen deine Daten nicht und geben sie nicht weiter.
