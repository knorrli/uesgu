  about:
    title: À propos de üsgu
    heading: À propos de üsgu
    intro: üsgu.ch rassemble les concerts et événements de la région au même endroit, directement depuis les pages des organisateurs et les agendas. Fini de fouiller dix sites pour savoir qui joue où et quand.
    why: Je l'ai créé parce que je perdais le fil moi-même, et que je ratais des concerts que j'aurais adoré voir. C'est un projet privé entre amis, pas une startup et pas un business. Pas de pub, rien à vendre.
    privacy: Plus d'infos sur la confidentialité →
  privacy:
    title: Confidentialité
    heading: Confidentialité
    intro: üsgu.ch est un projet privé et non commercial, et collecte le moins de données possible. Voici ce qui est enregistré, et pourquoi.
    collect_heading: Ce que nous enregistrons
    collect_account: Ton nom d'utilisateur et ton mot de passe (chiffré), pour que tu aies un compte.
    collect_email: Ton adresse e-mail, seulement si tu en donnes une, et uniquement pour t'envoyer les notifications que tu as configurées.
    collect_content: 'Ce que tu crées toi-même : filtres enregistrés et événements gardés.'
    collect_cookies: 'Trois cookies : l''un te garde connecté, un autre retient ton thème (clair/sombre), le dernier retient le filtre que tu as appliqué en dernier. Rien d''autre.'
    services_heading: Services externes
    services_hosting: 'Hébergement : Render (render.com). Tout tourne dans leur région de Francfort, tes données restent donc dans l''UE.'
    services_email: 'E-mail : Resend (resend.com) envoie les e-mails de notification optionnels. Pas d''e-mail, pas de Resend.'
    services_push: 'Push : si tu actives les notifications push, elles passent par le service push de ton navigateur ou de ton téléphone (Google, Mozilla ou Apple).'
    calendar_heading: Lien calendrier
    calendar_body: Si tu crées un abonnement calendrier, son lien contient un jeton secret. Toute personne à qui tu donnes ce lien peut voir tes événements enregistrés, alors garde-le pour toi. Tu peux le désactiver à tout moment dans les réglages.
    logs_heading: Journaux serveur
    logs_body: Le serveur garde des journaux de courte durée qui contiennent ton adresse IP, comme tout site web. Ils servent en cas d'erreur ou d'abus, et on ne s'en sert pas pour te pister ou te profiler.
    nothing_heading: Ce que nous ne faisons pas
    nothing_body: Aucun pistage, aucun outil de statistique, aucune pub. Nous ne vendons pas tes données et ne les partageons pas.
    delete_heading: Suppression
    delete_body: Tu peux supprimer ton compte à tout moment dans les réglages, et tout ce qui te concerne disparaît avec.
    contact_heading: Contact
    contact_body: Des questions sur la confidentialité ? Écris à %{email}.
    contact_email: kontakt@uesgu.ch
