<%# All tasks are defined at the top level (no environment key) so they run in
    every environment. Solid Queue only scopes by environment when a key matching
    Rails.env is present; introducing one here would exclude these root-level
    tasks from that environment. %>
<% Scrapers::All.scrapers.each do |name, scraper_class| %>
scrape_<%= name.underscore %>:
  class: 'ScrapeEventsJob'
  args: [ { scraper_class: "<%= scraper_class.name %>" } ]
  queue: events
  schedule: every day at midnight
<% end %>

clear_solid_queue_finished_jobs:
  command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
  schedule: every hour at minute 12

generate_notifications:
  class: 'GenerateNotificationsJob'
  schedule: every day at 6am
