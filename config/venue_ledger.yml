# VENUE LEDGER — the authoritative "have we decided on this source?" record.
# Rationale + algorithm: docs/discovery-design.md. Rules enforced by
# test/services/scrapers/ledger_drift_test.rb (a failing test explains itself).
#
# KEY: `domain` = the venue's own website, normalized to eTLD+1
#      (dachstock.ch — NOT www. / api. / https:// / a path). One row per domain.
#      A venue with no own site is keyed by its operator/feed host (Le Singe →
#      kartellculturel.ch). A SaaS-hosted feed (Bar 59 → firestore.googleapis.com)
#      is keyed by the venue domain; the scraper declares it via `venue_domains`.
#
# disposition:
#   consume — actively scraped. MUST be backed by a live scraper covering this
#             domain (drift rule 2 fails the build otherwise). No `reason`.
#   defer   — wanted, blocked NOW. Not scraped. `reason` required.
#   reject  — evaluated, not wanted. `reason` required.
#
# reason:   required for defer/reject, forbidden on consume. Must be one of the
#           keys in `reasons:` below.
#
# checked:  date last evaluated. A defer/reject with a `revisitable` reason
#           re-surfaces in the discovery report once this is >6 months old.
#           UPDATE IT when you re-evaluate.
#
# aliases:  per-upstream raw keys that resolve to this domain. petzi: the event
#           slug; ole: the feed host; hinto: the <location> name. Adding one here
#           permanently stops the discovery report from re-flagging that key —
#           this is how a one-time triage decision "sticks". (OLE feed hosts whose
#           eTLD+1 already equals `domain` resolve automatically; listed only for
#           provenance.)
#
# Don't name scrapers here — which class consumes a domain is derived live from
# the registry. The ledger is the independent record the drift test reconciles
# against; a scraper added without a row here, or a row here with no scraper,
# both fail the test.

# Reason vocabulary. `revisitable: true` reasons re-surface for re-check when
# stale; `false` reasons stay buried. Code reads this map (the drift test
# validates against its keys; the re-check logic reads `revisitable`), so these
# explanations never drift from behaviour.
reasons:
  robots:
    revisitable: true
    explanation: >
      robots.txt disallows the feed/pages we'd need for our UA. May change —
      sites revise robots.txt. Opting out of robots is a deliberate per-venue
      call (cf. Scrapers::BadBonn), not something we do unattended.
  js_only:
    revisitable: true
    explanation: >
      Page renders events via JavaScript with no machine-readable data, and our
      stack (Mechanize) can't run JS. Re-check periodically — sites add JSON-LD /
      structured data, or a JSON API we could reverse-engineer surfaces.
  no_date:
    revisitable: true
    explanation: >
      Listings exist but carry no scrapeable date/time (e.g. a WP REST endpoint
      that exposes the post date, not the event date). Unbuildable until a clean
      date source appears.
  inactive:
    revisitable: true
    explanation: >
      Feed/site exists but is unmaintained — stale or frozen data (e.g. a feed
      stuck on an old season). Worth re-checking in case it revives.
  needs_work:
    revisitable: true
    explanation: >
      Wanted, but needs significant custom integration before we can ingest it
      cleanly — e.g. a large mixed aggregator that needs scale handling, per-event
      keying, and music-only filtering. A build task, not a venue defect.
  feed_quality:
    revisitable: true
    explanation: >
      Feed parses but is too poor to ingest cleanly — e.g. no per-event URLs
      (broken links + same-date upsert collisions), no structured genres, or
      addresses jammed into the venue name. Revisit if the publisher improves it.
  non_music:
    revisitable: false
    explanation: >
      Not a music venue (cinema, cabaret/Kleinkunst, theatre, museum). Its
      programme would flood the taxonomy with non-music genres. Buried permanently.
  promoter:
    revisitable: false
    explanation: >
      A roving promoter/series with no fixed venue — events scatter across guest
      venues we already cover. Following it as a location would mislead and
      duplicate. Buried permanently.

