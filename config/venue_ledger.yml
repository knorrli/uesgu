  # --- defer: wanted, blocked now. Mirrored in Scrapers::Ole::DEFERRED.
  - domain: birdseye.ch
    name: Bird's Eye
    disposition: defer
    reason: robots
    checked: 2026-06-21
    aliases: { ole: [www.birdseye.ch] }   # clean OLE feed, robots-blocked. A jazz club we'd want.
  - domain: bejazz.ch
    name: BeJazz
    disposition: defer
    reason: robots
    checked: 2026-06-21
    aliases: { ole: [www.bejazz.ch] }     # OLE *aggregator* feed (per-event location), robots-blocked. Also a roving series.
  - domain: bewegungsmelder.ch
    name: Bewegungsmelder
    disposition: consume
    checked: 2026-06-21
    aliases: { ole: [bewegungsmelder.ch] }
    # Regional culture aggregator (Scrapers::OleBewegungsmelder, aggregator+
    # link_via: :source). ~7600 events / 152 pages, but mostly historical — ~28
    # upcoming at a time. Built 2026-06-21: keys on the per-event <source_url>
    # (the <url> is only a venue homepage → same-venue/same-date collisions),
    # prefers a real venue deep link for the link when the feed gives one; ~half
    # the programme is non-music, hidden via db/genres.yml dispositions (lean-
    # permissive). The <ticket_url> eventfrog mirror is never used, so eventfrog-
    # republished rows need no special handling. See FINDINGS-bewegungsmelder.md.

