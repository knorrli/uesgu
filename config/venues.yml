# VENUE REGISTRY — the single, code-controlled record of every venue we've
# decided on: its identity (domain, name, place), our decision (consume / defer /
# reject + reason), and discovery aliases. Wrapped by the Venue model
# (app/models/venue.rb), which exposes the computed API and the registry
# (Venue.all). See docs/venue-registry-design.md.
#
# IDENTITY + DECISION live here; SOURCING (which bespoke scraper / OLE feed /
# PETZI slug feeds a venue) is DERIVED from the live registry, not configured
# here — so there's no redundant wiring string to drift. `bin/rails
# venues:inventory` shows the joined picture.
#
#   domain      canonical eTLD+1, one row per venue (the key).
#   name        display label.
#   disposition consume | defer | reject. consume MUST be backed by a live
#               scraper (ledger drift test). defer/reject need a `reason`.
#   reason      one of Scrapers::Discovery::Ledger::REASONS (defer/reject only).
#   place       { city, canton } — venue identity; only for placed venues.
#   checked     date the decision was last evaluated (staleness re-check).
#   aliases     per-upstream raw keys that resolve here (petzi slug / ole host /
#               hinto <location> name) — discovery-dedup keys.

venues:
- domain: badbonn.ch
  name: Bad Bonn
  disposition: consume
  place:
    city: Düdingen
    canton: FR
  checked: 2026-06-21
- domain: bar59.ch
  name: Bar 59
  disposition: consume
  place:
    city: Luzern
    canton: LU
  checked: 2026-06-21
- domain: bee-flat.ch
  # The venue is the Turnhalle (its events are tagged "Turnhalle"); bee-flat is the
