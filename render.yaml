# Render Blueprint.
#
# The üsgu.ch project and its Production environment are declared here and
# matched BY NAME, so a sync adopts the existing ones rather than creating
# duplicates — the names below must match the dashboard exactly (case-sensitive).
#
# The shared-secret env group stays at the ROOT level (bottom): environment-
# scoped envVarGroups can't hold `sync: false` vars, so RAILS_MASTER_KEY must
# live in a workspace-level group. Scope it to Production in the Render dashboard
# if you want it to appear under the project — that assignment survives syncs.
version: "1"

projects:
  - name: "üsgu.ch"
    environments:
      - name: "Production"
        services:
          - type: web
            name: uesgu
            repo: https://github.com/knorrli/uesgu
            runtime: ruby
            plan: starter
            region: frankfurt
            buildCommand: "./bin/render-build.sh"
            # Migrations run here (available on paid plans), AFTER a successful build
            # and BEFORE the new release goes live — not in buildCommand, which runs on
            # every build (incl. ones that never deploy) and ahead of cutover. This ties
            # schema changes to actual deploys.
            preDeployCommand: "bin/rails db:migrate"
            startCommand: "./bin/rails server"
            # Custom domains. üsgu.ch is the public, canonical web domain; it MUST be
            # listed in its punycode form (xn--sgu-goa.ch) — Render rejects raw umlauts.
            # uesgu.ch is the canonical code/email domain; Render terminates TLS for it
            # and the app 301s every uesgu.ch request to https://üsgu.ch (see routes.rb).
            # Render auto-issues + renews certs for all four once DNS points at it.
            domains:
              - xn--sgu-goa.ch
              - www.xn--sgu-goa.ch
              - uesgu.ch
              - www.uesgu.ch
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: uesgu-db
                  property: connectionString
              - fromGroup: uesgu-env
              - key: WEB_CONCURRENCY
                value: 1
              # Cap glibc's malloc arenas (default ~8 x CPU cores). Ruby's GVL
              # serialises Ruby code anyway, so the extra arenas buy no real
              # parallelism here — they just over-reserve and fragment, ratcheting
              # RSS up. With a single Puma worker + 3 threads, 2 arenas is plenty
              # and typically trims 10-30% off resident memory for free headroom
              # under the 512MB starter limit.
              - key: MALLOC_ARENA_MAX
                value: 2
            autoDeployTrigger: commit

          # Daily scrape of every venue — replaces the in-Puma Solid Queue scheduler.
          # Runs on its own ephemeral instance (billed per second), so scraping no longer
          # competes with Puma for the web instance's RAM. Render cron schedules are UTC;
          # the exact hour isn't critical. The rake task loops all scrapers SEQUENTIALLY
          # (one Mechanize agent in memory at a time — safe on 512MB, and a natural
          # stagger), logs a per-scraper summary, and exits non-zero if any scraper fails
          # so Render sends a failure notification.
          - type: cron
            name: scrape-all
            repo: https://github.com/knorrli/uesgu
            runtime: ruby
            plan: starter
            region: frankfurt
            schedule: "0 2 * * *"
            buildCommand: "bundle install"
            startCommand: "bin/rails scrapers:run_all"
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: uesgu-db
                  property: connectionString
              - fromGroup: uesgu-env
              - key: RAILS_ENV
                value: production
            autoDeployTrigger: commit

          # Per-user-due notification sweep. Runs every 15 min so each alert fires
          # within a quarter-hour of its chosen time; the rake task is idempotent
          # (skips rules whose scheduled moment hasn't passed / already fired), so
          # frequent runs are safe. Needs RAILS_MASTER_KEY (push VAPID + Resend
          # key live in credentials) — supplied via the uesgu-env group.
          - type: cron
            name: notify-due
            repo: https://github.com/knorrli/uesgu
            runtime: ruby
            plan: starter
            region: frankfurt
            schedule: "*/15 * * * *"
            buildCommand: "bundle install"
            startCommand: "bin/rails notification_rules:tick"
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: uesgu-db
                  property: connectionString
              - fromGroup: uesgu-env
              - key: RAILS_ENV
                value: production
            autoDeployTrigger: commit

        databases:
          - name: uesgu-db
            databaseName: uesgu_db_hmks
            user: uesgu_db_hmks_user
            plan: basic-256mb
            region: frankfurt
            # Locked down: no public connections. The app reaches the DB over the
            # private network (fromDatabase resolves to the internal URL), so an
            # empty allow-list doesn't affect it — only external psql is blocked.
            ipAllowList: []
            postgresMajorVersion: "18"
            diskSizeGB: 1

# Shared secrets + config entered ONCE and referenced by every service via
# `fromGroup`. RAILS_MASTER_KEY decrypts credentials.yml.enc (secret_key_base
# etc.), so every service — web and cron — needs it. Kept at the ROOT (workspace)
# level on purpose: environment-scoped envVarGroups can't contain `sync: false`
# vars. PUBLIC_HOST / CODE_HOST make the two production domains explicit here
# (they back AppHost::PUBLIC / CODE in config/application.rb, whose defaults
# already match these) so a future domain move is a one-place change that every
# link- and email-emitting service picks up at once.
envVarGroups:
  - name: uesgu-env
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: PUBLIC_HOST
        value: xn--sgu-goa.ch
      - key: CODE_HOST
        value: uesgu.ch
