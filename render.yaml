services:
  - type: web
    name: uesgu
    runtime: ruby
    plan: starter
    region: frankfurt
    buildCommand: "./bin/render-build.sh"
    # preDeployCommand: "bundle exec rails db:migrate" # preDeployCommand only available on paid instance types
    startCommand: "./bin/rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uesgu-db
          property: connectionString
      - fromGroup: uesgu-secrets
      - key: WEB_CONCURRENCY
        value: 1

  # Daily scrape of every venue — replaces the in-Puma Solid Queue scheduler.
  # Runs on its own ephemeral instance (billed per second), so scraping no longer
  # competes with Puma for the web instance's RAM. Render cron schedules are UTC;
  # the exact hour isn't critical. The rake task loops all scrapers SEQUENTIALLY
  # (one Mechanize agent in memory at a time — safe on 512MB, and a natural
  # stagger), logs a per-scraper summary, and exits non-zero if any scraper fails
  # so Render sends a failure notification.
  - type: cron
    name: scrape-all
    runtime: ruby
    plan: starter
    region: frankfurt
    schedule: "0 2 * * *"
    buildCommand: "bundle install"
    startCommand: "bin/rails scrapers:run_all"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uesgu-db
          property: connectionString
      - fromGroup: uesgu-secrets
      - key: RAILS_ENV
        value: production

databases:
  - name: uesgu-db
    plan: basic-256mb
    region: frankfurt

# Shared secrets entered ONCE and referenced by every service above via
# `fromGroup`. RAILS_MASTER_KEY decrypts credentials.yml.enc (which holds
# secret_key_base etc.), so every service — web and crons — needs it.
envVarGroups:
  - name: uesgu-secrets
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
